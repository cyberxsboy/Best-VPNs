<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像转ASCII艺术转换器</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .upload-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px dashed #dee2e6;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: #4ecdc4;
            background: #f0f8ff;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-button {
            display: block;
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .control-group select,
        .control-group input[type="range"],
        .control-group input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            font-size: 1rem;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .preview-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .preview-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .preview-box h3 {
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .image-preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }

        .ascii-output {
            background: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 8px;
            line-height: 1;
            padding: 15px;
            border-radius: 8px;
            overflow: auto;
            max-height: 400px;
            white-space: pre;
            border: 2px solid #333;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: linear-gradient(45deg, #56ab2f, #a8e6cf);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4ecdc4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .preview-section {
                grid-template-columns: 1fr;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 图像转ASCII艺术</h1>
            <p>将您的图片转换为炫酷的字符艺术作品</p>
        </div>

        <div class="content">
            <!-- 文件上传区域 -->
            <div class="upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="imageInput" class="file-input" accept="image/*">
                    <label for="imageInput" class="file-input-button">
                        📁 点击选择图片文件 或 拖拽图片到这里
                    </label>
                </div>
            </div>

            <!-- 控制面板 -->
            <div class="controls">
                <div class="control-group">
                    <label for="charsetSelect">字符集类型:</label>
                    <select id="charsetSelect">
                        <option value="default">标准ASCII (@%#*+=-:. )</option>
                        <option value="extended">扩展符号 (█▉▊▋▌▍▎▏)</option>
                        <option value="random">随机字符 (A-Z, 0-9, 符号)</option>
                        <option value="chinese">中文字符 (龘靐齉齾爩)</option>
                        <option value="mixed">混合字符集</option>
                        <option value="custom">自定义字符</option>
                    </select>
                    <div id="customCharset" class="hidden" style="margin-top: 10px;">
                        <input type="text" id="customChars" placeholder="输入自定义字符..." 
                               style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                </div>

                <div class="control-group">
                    <label for="widthSlider">输出宽度: <span id="widthValue">100</span></label>
                    <input type="range" id="widthSlider" min="20" max="200" value="100">
                </div>

                <div class="control-group">
                    <label for="contrastSlider">对比度: <span id="contrastValue">1.0</span></label>
                    <input type="range" id="contrastSlider" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>

                <div class="control-group">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="randomizeCheck">
                        <label for="randomizeCheck">启用随机化效果</label>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="invertCheck">
                        <label for="invertCheck">反转颜色</label>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="colorCheck">
                        <label for="colorCheck">彩色ASCII</label>
                    </div>
                </div>
            </div>

            <!-- 预览区域 -->
            <div class="preview-section">
                <div class="preview-box">
                    <h3>📷 原始图片</h3>
                    <img id="imagePreview" class="image-preview hidden" alt="图片预览">
                    <div id="imagePlaceholder" style="text-align: center; padding: 50px; color: #999;">
                        请先选择一张图片
                    </div>
                </div>

                <div class="preview-box">
                    <h3>🎭 ASCII艺术</h3>
                    <div id="asciiOutput" class="ascii-output">
                        ASCII艺术将在这里显示...
                    </div>
                </div>
            </div>

            <!-- 加载动画 -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在处理图片，请稍候...</p>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button id="convertBtn" class="btn btn-primary">🎨 转换图片</button>
                <button id="downloadBtn" class="btn btn-secondary">💾 下载ASCII文本</button>
                <button id="copyBtn" class="btn btn-success">📋 复制到剪贴板</button>
                <button id="randomBtn" class="btn btn-secondary">🎲 随机效果</button>
            </div>
        </div>
    </div>

    <script>
        class ImageToASCII {
            constructor() {
                this.charSets = {
                    default: "@%#*+=-:. ",
                    extended: "█▉▊▋▌▍▎▏▐░▒▓▔▕▖▗▘▙▚▛▜▝▞▟■□▢▣▤▥▦▧▨▩▪▫▬▭▮▯▰▱",
                    random: "!@#$%^&*()_+-=[]{}|;:,.<>?/~`abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
                    chinese: "龘靐齉齾爩麤鱻驫騳虋讟钃鸜麷鞻韽韾顟饙饙龗鸞鸝鸟鸠鸡鸢鸣鸤鸥鸦鸧鸨鸩鸪鸫鸬鸭鸮鸯鸰鸱鸲鸳",
                    mixed: "@%#*+=-:. █▉▊▋▌▍▎▏!@#$%^&*()"
                };
                
                this.currentImage = null;
                this.initializeElements();
                this.bindEvents();
            }

            initializeElements() {
                this.imageInput = document.getElementById('imageInput');
                this.imagePreview = document.getElementById('imagePreview');
                this.imagePlaceholder = document.getElementById('imagePlaceholder');
                this.asciiOutput = document.getElementById('asciiOutput');
                this.charsetSelect = document.getElementById('charsetSelect');
                this.customCharset = document.getElementById('customCharset');
                this.customChars = document.getElementById('customChars');
                this.widthSlider = document.getElementById('widthSlider');
                this.widthValue = document.getElementById('widthValue');
                this.contrastSlider = document.getElementById('contrastSlider');
                this.contrastValue = document.getElementById('contrastValue');
                this.randomizeCheck = document.getElementById('randomizeCheck');
                this.invertCheck = document.getElementById('invertCheck');
                this.colorCheck = document.getElementById('colorCheck');
                this.convertBtn = document.getElementById('convertBtn');
                this.downloadBtn = document.getElementById('downloadBtn');
                this.copyBtn = document.getElementById('copyBtn');
                this.randomBtn = document.getElementById('randomBtn');
                this.loading = document.getElementById('loading');
            }

            bindEvents() {
                // 文件输入
                this.imageInput.addEventListener('change', (e) => this.handleFileSelect(e));
                
                // 拖拽支持
                const uploadSection = document.querySelector('.upload-section');
                uploadSection.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadSection.style.borderColor = '#4ecdc4';
                    uploadSection.style.background = '#f0f8ff';
                });
                
                uploadSection.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    uploadSection.style.borderColor = '#dee2e6';
                    uploadSection.style.background = '#f8f9fa';
                });
                
                uploadSection.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadSection.style.borderColor = '#dee2e6';
                    uploadSection.style.background = '#f8f9fa';
                    
                    const files = e.dataTransfer.files;
                    if (files.length > 0 && files[0].type.startsWith('image/')) {
                        this.imageInput.files = files;
                        this.handleFileSelect({ target: { files: files } });
                    }
                });

                // 控件事件
                this.charsetSelect.addEventListener('change', () => {
                    if (this.charsetSelect.value === 'custom') {
                        this.customCharset.classList.remove('hidden');
                    } else {
                        this.customCharset.classList.add('hidden');
                    }
                    if (this.currentImage) this.convertImage();
                });

                this.customChars.addEventListener('input', () => {
                    if (this.currentImage && this.charsetSelect.value === 'custom') {
                        this.convertImage();
                    }
                });

                this.widthSlider.addEventListener('input', () => {
                    this.widthValue.textContent = this.widthSlider.value;
                    if (this.currentImage) this.convertImage();
                });

                this.contrastSlider.addEventListener('input', () => {
                    this.contrastValue.textContent = this.contrastSlider.value;
                    if (this.currentImage) this.convertImage();
                });

                this.randomizeCheck.addEventListener('change', () => {
                    if (this.currentImage) this.convertImage();
                });

                this.invertCheck.addEventListener('change', () => {
                    if (this.currentImage) this.convertImage();
                });

                this.colorCheck.addEventListener('change', () => {
                    if (this.currentImage) this.convertImage();
                });

                // 按钮事件
                this.convertBtn.addEventListener('click', () => this.convertImage());
                this.downloadBtn.addEventListener('click', () => this.downloadASCII());
                this.copyBtn.addEventListener('click', () => this.copyToClipboard());
                this.randomBtn.addEventListener('click', () => this.randomizeSettings());
            }

            handleFileSelect(event) {
                const file = event.target.files[0];
                if (!file || !file.type.startsWith('image/')) {
                    alert('请选择一个有效的图片文件！');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    this.imagePreview.src = e.target.result;
                    this.imagePreview.classList.remove('hidden');
                    this.imagePlaceholder.style.display = 'none';
                    
                    // 创建图片对象用于处理
                    const img = new Image();
                    img.onload = () => {
                        this.currentImage = img;
                        this.convertImage();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            convertImage() {
                if (!this.currentImage) return;

                this.loading.style.display = 'block';
                
                // 使用setTimeout让UI有时间更新
                setTimeout(() => {
                    try {
                        const ascii = this.imageToASCII(this.currentImage);
                        this.displayASCII(ascii);
                    } catch (error) {
                        console.error('转换错误:', error);
                        this.asciiOutput.textContent = '转换失败，请尝试其他设置。';
                    } finally {
                        this.loading.style.display = 'none';
                    }
                }, 100);
            }

            imageToASCII(img) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const width = parseInt(this.widthSlider.value);
                const aspectRatio = img.height / img.width;
                const height = Math.floor(width * aspectRatio * 0.5); // 字符高度补偿
                
                canvas.width = width;
                canvas.height = height;
                
                // 应用对比度
                const contrast = parseFloat(this.contrastSlider.value);
                ctx.filter = `contrast(${contrast})`;
                
                ctx.drawImage(img, 0, 0, width, height);
                
                const imageData = ctx.getImageData(0, 0, width, height);
                const pixels = imageData.data;
                
                // 获取字符集
                let chars = this.getCharSet();
                
                if (this.randomizeCheck.checked) {
                    chars = this.shuffleString(chars);
                }
                
                let ascii = '';
                const isColor = this.colorCheck.checked;
                
                for (let y = 0; y < height; y++) {
                    let line = '';
                    for (let x = 0; x < width; x++) {
                        const index = (y * width + x) * 4;
                        const r = pixels[index];
                        const g = pixels[index + 1];
                        const b = pixels[index + 2];
                        
                        // 计算灰度
                        let gray = Math.floor(0.299 * r + 0.587 * g + 0.114 * b);
                        
                        // 反转颜色
                        if (this.invertCheck.checked) {
                            gray = 255 - gray;
                        }
                        
                        // 映射到字符
                        const charIndex = Math.floor((gray / 255) * (chars.length - 1));
                        let char = chars[charIndex];
                        
                        // 添加随机性
                        if (this.randomizeCheck.checked && Math.random() < 0.1) {
                            const randomIndex = Math.floor(Math.random() * chars.length);
                            char = chars[randomIndex];
                        }
                        
                        // 彩色模式
                        if (isColor) {
                            const color = `rgb(${r},${g},${b})`;
                            line += `<span style="color: ${color}">${char}</span>`;
                        } else {
                            line += char;
                        }
                    }
                    ascii += line + '\n';
                }
                
                return ascii;
            }

            getCharSet() {
                const selected = this.charsetSelect.value;
                if (selected === 'custom') {
                    const custom = this.customChars.value.trim();
                    return custom || this.charSets.default;
                }
                return this.charSets[selected] || this.charSets.default;
            }

            shuffleString(str) {
                return str.split('').sort(() => Math.random() - 0.5).join('');
            }

            displayASCII(ascii) {
                if (this.colorCheck.checked) {
                    this.asciiOutput.innerHTML = ascii;
                } else {
                    this.asciiOutput.textContent = ascii;
                }
            }

            downloadASCII() {
                const ascii = this.asciiOutput.textContent || this.asciiOutput.innerText;
                if (!ascii || ascii === 'ASCII艺术将在这里显示...') {
                    alert('请先转换一张图片！');
                    return;
                }

                const blob = new Blob([ascii], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ascii-art-${Date.now()}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            async copyToClipboard() {
                const ascii = this.asciiOutput.textContent || this.asciiOutput.innerText;
                if (!ascii || ascii === 'ASCII艺术将在这里显示...') {
                    alert('请先转换一张图片！');
                    return;
                }

                try {
                    await navigator.clipboard.writeText(ascii);
                    alert('ASCII艺术已复制到剪贴板！');
                } catch (err) {
                    console.error('复制失败:', err);
                    // 备用方案
                    const textArea = document.createElement('textarea');
                    textArea.value = ascii;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    alert('ASCII艺术已复制到剪贴板！');
                }
            }

            randomizeSettings() {
                // 随机选择字符集
                const charsets = Object.keys(this.charSets);
                const randomCharset = charsets[Math.floor(Math.random() * charsets.length)];
                this.charsetSelect.value = randomCharset;
                
                // 随机宽度
                const randomWidth = Math.floor(Math.random() * 100) + 50;
                this.widthSlider.value = randomWidth;
                this.widthValue.textContent = randomWidth;
                
                // 随机对比度
                const randomContrast = (Math.random() * 1.5 + 0.5).toFixed(1);
                this.contrastSlider.value = randomContrast;
                this.contrastValue.textContent = randomContrast;
                
                // 随机选项
                this.randomizeCheck.checked = Math.random() > 0.5;
                this.invertCheck.checked = Math.random() > 0.7;
                this.colorCheck.checked = Math.random() > 0.8;
                
                // 触发转换
                if (this.currentImage) {
                    this.convertImage();
                }
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new ImageToASCII();
        });
    </script>
</body>

</html>
